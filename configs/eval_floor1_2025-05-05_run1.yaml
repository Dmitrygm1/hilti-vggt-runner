eval_name: supervisor_gt_reference
run_name: floor_1_2025-05-05_run_1

ground_truth:
  trajectory_txt: ${HOME}/projects/hilti-trimble-slam-challenge-2026/groundtruth/floor_1_2025-05-05_run_1.txt
  init_pose_csv: ${HOME}/projects/hilti-trimble-slam-challenge-2026/groundtruth/init_gt_poses.csv

timing:
  absolute_start_time_seconds: 10000.0
  ignore_initial_seconds: 5.0
  association_tolerance_seconds: 0.05

trajectory:
  alignment_modes:
    - rigid_se3
    - init_anchor
    - sim3_diagnostic
  anchor_mode: init_yaw_translation
  init_anchor_tolerance_seconds: 1.0
  rpe_horizon_seconds: 1.0
  rpe_tolerance_seconds: 0.25

floorplan:
  png_path: ${HOME}/projects/hilti-trimble-slam-challenge-2026/floorplans/masks_no_windows/floor_1.png
  base_resolution_m_per_px: 0.01
  eval_resolution_m_per_px: 0.05
  wall_dilation_m: 0.15
  wall_match_radius_m: 0.15
  trajectory_corridor_m: 3.0
  z_min_m: 0.2
  z_max_m: 2.5
  min_points_per_cell: 3
  vertical_extent_min_m: 0.5
  prefer_raw_logs: true
